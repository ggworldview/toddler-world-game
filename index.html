<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Open Graph / LINE 分享顯示設定 -->
    <meta property="og:title" content="萌嵐的五彩繽紛世界 🌟">
    <meta property="og:description" content="專為萌嵐打造！內含 300+ 張高品質真實相片、雙語發音與豐富場景的幼兒認知圖鑑遊戲！">
    <meta property="og:type" content="website">
    <title>萌嵐的五彩繽紛世界</title>
    <!-- 使用 Google Fonts 提供更活潑的字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@700&display=swap"
        rel="stylesheet">
    <!-- 引入 Canvas Confetti 函式庫 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- 開頭畫面：必須由使用者點擊才能解鎖瀏覽器語音播放限制 -->
    <div id="start-overlay" class="overlay">
        <h1>👋 嗨！</h1>
        <p id="welcome-text">歡迎來到萌嵐的五彩繽紛的世界</p>
        <button id="start-btn">開始玩囉！</button>
    </div>

    <!-- 主遊戲畫面 -->
    <div id="game-container" class="hidden">

        <!-- 語言切換選單 -->
        <div id="lang-selector" class="lang-selector">
            <button class="lang-btn active" data-lang="zh">🇹🇼</button>
            <button class="lang-btn" data-lang="en">🇺🇸</button>
            <button class="lang-btn" data-lang="ja">🇯🇵</button>
        </div>

        <!-- 分類切換區：支援左右滑動以容納多個分類 -->
        <div class="category-tabs">
            <button class="tab-btn active" data-category="animals" data-name-zh="動物" data-name-en="Animals" data-name-ja="動物">🐻 動物</button>
            <button class="tab-btn" data-category="pets" data-name-zh="寵物" data-name-en="Pets" data-name-ja="ペット">🐶 寵物</button>
            <button class="tab-btn" data-category="ocean" data-name-zh="海洋" data-name-en="Ocean" data-name-ja="海">🐠 海洋</button>
            <button class="tab-btn" data-category="vehicles" data-name-zh="交通" data-name-en="Vehicles" data-name-ja="乗り物">🚗 交通</button>
            <button class="tab-btn" data-category="fruits" data-name-zh="蔬果" data-name-en="Fruits" data-name-ja="果物">🍎 蔬果</button>
            <button class="tab-btn" data-category="insects" data-name-zh="昆蟲" data-name-en="Insects" data-name-ja="昆虫">🐛 昆蟲</button>
            <button class="tab-btn" data-category="dinosaurs" data-name-zh="恐龍" data-name-en="Dinosaurs" data-name-ja="恐竜">🦖 恐龍</button>
            <button class="tab-btn" data-category="household" data-name-zh="物品" data-name-en="Household" data-name-ja="日用品">🪑 物品</button>
            <button class="tab-btn" data-category="shapes" data-name-zh="形狀" data-name-en="Shapes" data-name-ja="形">🔺 形狀</button>
            <button class="tab-btn" data-category="numbers" data-name-zh="數字" data-name-en="Numbers" data-name-ja="数字">🔢 數字</button>
            <button class="tab-btn" data-category="letters" data-name-zh="字母" data-name-en="Letters" data-name-ja="アルファベット">🔠 字母</button>
        </div>

        <!-- 主題展示區 -->
        <div class="main-display">
            <!-- 換上一個/下一個功能，因為修改為隨機，直接統一為換一個也可以，但保留箭頭習慣 -->
            <button id="prev-btn" class="nav-btn">◀</button>

            <div id="card" class="interactive-card glass-card">
                <div id="item-emoji" class="emoji-display">🐘</div>
                <div id="item-name" class="name-display">大象</div>
            </div>

            <button id="next-btn" class="nav-btn">▶</button>
        </div>

    </div>

    <!-- 匯入第三方高品質 SVG 向量圖示庫 (Twemoji) -->
    <script src="https://unpkg.com/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>

    <!-- 匯入資料庫 -->
    <script src="data.js"></script>
    <script src="main.js"></script>
</body>

</html>
